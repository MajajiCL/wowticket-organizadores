name: Build & Deploy a GitHub Pages

# Despliega en cada push a main, cada 6 horas (refresca los eventos publicados),
# y manualmente desde la pestaña Actions.
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (export estático con eventos al día)
        run: npm run build
        env:
          PAGES: "true"
          NEXT_PUBLIC_ASSET_PREFIX: "/wowticket-organizadores"

      - name: Deploy a gh-pages
        run: |
          touch out/.nojekyll
          cd out
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Auto-deploy ($(date -u +%FT%TZ)) — eventos al día"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:gh-pages
